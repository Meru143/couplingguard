name: Release

# Run only when explicitly dispatched or when a vX.Y.Z tag is pushed.
# This avoids semantic-release attempting to publish on every commit
# to main before PyPI Trusted Publishing is configured.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    # Must match the GitHub Actions environment configured in
    # Settings -> Environments. The PyPI Trusted Publisher claim
    # rejects the OIDC token if this string doesn't match the
    # 'Environment name' set in the PyPI publisher config.
    environment:
      name: pypi
      url: https://pypi.org/project/couplingguard/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install python-semantic-release build

      - name: Build distribution
        run: python -m build

      - name: Run semantic-release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      - name: Publish to PyPI via Trusted Publishing
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Update v1 major-version tag
        if: steps.release.outputs.released == 'true'
        run: |
          git tag -f v1
          git push -f origin v1
