name: Release

# Tag-driven release: the tag IS the version. semantic-release was
# removed because it expects to compute the version from commits and
# create the tag itself, which fought the tag-push trigger below.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    # Must match the GitHub Actions environment configured in
    # Settings -> Environments. The PyPI Trusted Publisher claim
    # rejects the OIDC token if this string doesn't match the
    # 'Environment name' set in the PyPI publisher config.
    environment:
      name: pypi
      url: https://pypi.org/project/couplingguard/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a real PAT only if we need to push the v1 tag back to
          # a protected branch; the default GITHUB_TOKEN can push tags
          # so we don't need anything fancier.

      - name: Resolve tag name
        id: tagname
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine tag name."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Sync pyproject version to tag (PEP 440 normalized)
        run: |
          python <<'PY'
          import pathlib
          import re
          import tomllib

          tag = "${{ steps.tagname.outputs.tag }}"
          tag_ver = tag.lstrip("v")

          # PEP 440 normalization of pre-release tags. We support the three
          # forms semantic-version users typically reach for:
          #   v0.1.0-rc1     -> 0.1.0rc1
          #   v0.1.0-beta.2  -> 0.1.0b2
          #   v0.1.0-alpha1  -> 0.1.0a1
          # Plain v0.1.0 passes through unchanged.
          normalized = tag_ver
          for src, dst in (("-rc.", "rc"), ("-rc", "rc"),
                           ("-beta.", "b"), ("-beta", "b"),
                           ("-alpha.", "a"), ("-alpha", "a")):
              normalized = normalized.replace(src, dst)

          path = pathlib.Path("pyproject.toml")
          original = path.read_text()
          new_text, n = re.subn(
              r'^version = ".*"',
              f'version = "{normalized}"',
              original,
              count=1,
              flags=re.MULTILINE,
          )
          if n != 1:
              raise SystemExit(
                  f"::error::could not find/replace project.version in pyproject.toml (matches={n})"
              )
          path.write_text(new_text)

          # Sanity-check the result parses back to what we expect.
          parsed = tomllib.loads(new_text)
          got = parsed["project"]["version"]
          if got != normalized:
              raise SystemExit(
                  f"::error::pyproject.toml rewrite produced {got!r}, expected {normalized!r}"
              )
          # Also sync the __version__ in __init__.py so `couplingguard.__version__`
          # reports the right thing at runtime.
          init_path = pathlib.Path("src/couplingguard/__init__.py")
          init_text = init_path.read_text(encoding="utf-8")
          init_text, m = re.subn(
              r'^__version__ = ".*"',
              f'__version__ = "{normalized}"',
              init_text,
              count=1,
              flags=re.MULTILINE,
          )
          if m != 1:
              raise SystemExit("::error::could not find __version__ in src/couplingguard/__init__.py")
          init_path.write_text(init_text, encoding="utf-8")

          print(f"tag={tag} -> normalized={normalized}")
          PY
          echo "--- pyproject.toml version line ---"
          grep -E '^version = ' pyproject.toml
          echo "--- __init__.py version line ---"
          grep -E '^__version__' src/couplingguard/__init__.py

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify build output
        run: |
          ls -lh dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api token needed — Trusted Publisher OIDC handles auth.
        # Pre-release tags (e.g. v0.1.0-rc1) upload too; PyPI marks them
        # as pre-releases automatically based on PEP 440 version parsing.

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build a brief release body from the CHANGELOG's [Unreleased]
          # section (if present) or fall back to a minimal note.
          BODY_FILE=$(mktemp)
          if grep -q "^## \[Unreleased\]" CHANGELOG.md 2>/dev/null; then
            awk '/^## \[Unreleased\]/{flag=1; next} /^## /{flag=0} flag' CHANGELOG.md > "$BODY_FILE"
          fi
          if [ ! -s "$BODY_FILE" ]; then
            echo "Release ${{ steps.tagname.outputs.tag }}." > "$BODY_FILE"
          fi

          PRERELEASE_FLAG=""
          if [[ "${{ steps.tagname.outputs.tag }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.tagname.outputs.tag }}" \
            --title "${{ steps.tagname.outputs.tag }}" \
            --notes-file "$BODY_FILE" \
            $PRERELEASE_FLAG \
            dist/*.whl dist/*.tar.gz

      - name: Update v1 major-version tag
        # Only move v1 on stable releases (no pre-release suffix). rc / beta
        # tags should not advance the major-version pointer.
        if: ${{ !contains(steps.tagname.outputs.tag, '-') }}
        run: |
          git tag -f v1
          git push -f origin v1
