<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="couplingguard — detect file coupling risk in pull requests from git co-change history">
  <defs>
    <!-- Deep blue-black base. Tinted toward the warm accent so the dark feels intentional, not flat. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08081e"/>
      <stop offset="0.55" stop-color="#0d0d2a"/>
      <stop offset="1" stop-color="#15142f"/>
    </linearGradient>

    <!-- Single radial mesh — large, off-center, behind the wordmark. -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="0.4" stop-color="#f59e0b" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Quieter secondary mesh on the opposite side for compositional balance. -->
    <radialGradient id="ambient2" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette: pulls the eye into the center, away from the canvas edges. -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Subtle dot texture instead of a hard grid. -->
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#475569" fill-opacity="0.16"/>
    </pattern>

    <!-- Hairline divider gradient (fades in from edges) -->
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- LAYER 1: background -->
  <rect width="1200" height="380" fill="url(#bg)"/>

  <!-- LAYER 2: dot texture -->
  <rect width="1200" height="380" fill="url(#dots)"/>

  <!-- LAYER 3: two radial atmospheres (warm orange on the left, cool violet on the right) -->
  <ellipse cx="350" cy="200" rx="520" ry="320" fill="url(#ambient)"/>
  <ellipse cx="950" cy="220" rx="420" ry="280" fill="url(#ambient2)"/>

  <!-- LAYER 4: vignette over everything to bias eye toward center -->
  <rect width="1200" height="380" fill="url(#vignette)"/>

  <!-- LAYER 5: centered hero typography
       Everything centered on the canvas (x=600). Generous vertical rhythm. -->
  <g text-anchor="middle">
    <!-- Eyebrow tag — uppercase metadata with bullet separators. Tiny, generous tracking. -->
    <text x="600" y="100"
          font-family="-apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="12" font-weight="700" letter-spacing="4.2"
          fill="#94a3b8">GITHUB ACTION   ·   MIT   ·   FREE   ·   PYTHON 3.11+</text>

    <!-- Top hairline divider (eye separator between eyebrow and wordmark) -->
    <rect x="500" y="118" width="200" height="1" fill="url(#rule)"/>

    <!-- Wordmark — two separate text elements that MEET at the canvas center.
         Avoiding inline tspans entirely (some renderers add a ghost-space between
         differently-coloured spans even when no whitespace exists in the source).
         "coupling" is right-anchored at x=600; "guard" is left-anchored at x=600.
         text-anchor on each is set explicitly to override the parent's "middle". -->
    <text x="600" y="216" text-anchor="end"
          font-family="-apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-weight="800" font-size="100" fill="#f8fafc" letter-spacing="-2">coupling</text>
    <text x="600" y="216" text-anchor="start"
          font-family="-apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-weight="800" font-size="100" fill="#f59e0b" letter-spacing="-2">guard</text>

    <!-- Tagline — single line, lighter weight, slate-300 -->
    <text x="600" y="262"
          font-family="-apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-weight="400" font-size="22" fill="#cbd5e1">Detect file coupling risk in pull requests from your repository's git co-change history.</text>
  </g>

  <!-- LAYER 6: bottom row of category pills, centered.
       Drawn outside the text-anchor group so each pill's rect can be placed independently. -->
  <g transform="translate(0 320)" font-family="-apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="2.4">
    <!-- Pills are pre-measured: widths 132, 134, 116, 96, 100. Total: 578 + gaps. -->
    <!-- 5 pills, each 14px gap. Total layout width: 132+14+134+14+116+14+96+14+100 = 634. Start x = (1200-634)/2 = 283. -->
    <g transform="translate(283 0)">
      <rect x="0" y="-14" width="132" height="26" rx="13" fill="#161630" stroke="#334155" stroke-width="1"/>
      <text x="66" y="3" text-anchor="middle" fill="#cbd5e1">CODE QUALITY</text>
    </g>
    <g transform="translate(429 0)">
      <rect x="0" y="-14" width="134" height="26" rx="13" fill="#161630" stroke="#334155" stroke-width="1"/>
      <text x="67" y="3" text-anchor="middle" fill="#cbd5e1">PULL REQUEST</text>
    </g>
    <g transform="translate(577 0)">
      <rect x="0" y="-14" width="116" height="26" rx="13" fill="#161630" stroke="#334155" stroke-width="1"/>
      <text x="58" y="3" text-anchor="middle" fill="#cbd5e1">CO-CHANGE</text>
    </g>
    <g transform="translate(707 0)">
      <rect x="0" y="-14" width="96" height="26" rx="13" fill="#161630" stroke="#334155" stroke-width="1"/>
      <text x="48" y="3" text-anchor="middle" fill="#cbd5e1">GITHUB</text>
    </g>
    <g transform="translate(817 0)">
      <rect x="0" y="-14" width="100" height="26" rx="13" fill="#161630" stroke="#334155" stroke-width="1"/>
      <text x="50" y="3" text-anchor="middle" fill="#cbd5e1">GITLAB</text>
    </g>
  </g>
</svg>
