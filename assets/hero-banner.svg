<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="couplingguard — detect file coupling risk in PRs from git co-change history">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="170" cy="160" r="220" fill="url(#glowOrange)"/>
  <circle cx="980" cy="200" r="190" fill="url(#glowRed)"/>

  <!-- Faint grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.18">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- Coupling-graph illustration on the right -->
  <g transform="translate(820 160)">
    <!-- Edges first (under nodes) -->
    <line x1="-40" y1="-60" x2="80" y2="-20" stroke="#ef4444" stroke-width="3" opacity="0.85"/>
    <line x1="-40" y1="-60" x2="60" y2="70" stroke="#f59e0b" stroke-width="2.5" opacity="0.65"/>
    <line x1="-40" y1="-60" x2="-90" y2="40" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="-20" x2="60" y2="70" stroke="#f59e0b" stroke-width="2" opacity="0.55"/>
    <line x1="-90" y1="40" x2="60" y2="70" stroke="#475569" stroke-width="1.5" opacity="0.4"/>

    <!-- Nodes -->
    <g>
      <circle r="22" cx="-40" cy="-60" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="-40" y="-55" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#f8fafc">payment</text>
    </g>
    <g>
      <circle r="18" cx="80" cy="-20" fill="#1e293b" stroke="#ef4444" stroke-width="2.5"/>
      <text x="80" y="-16" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#f8fafc">billing</text>
    </g>
    <g>
      <circle r="16" cx="60" cy="70" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <text x="60" y="74" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#f8fafc">tests</text>
    </g>
    <g>
      <circle r="14" cx="-90" cy="40" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
      <text x="-90" y="44" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#f8fafc">utils</text>
    </g>
  </g>

  <!-- Brand mark -->
  <g transform="translate(80 120)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="68" fill="#f8fafc" letter-spacing="-2">
      coupling<tspan fill="#f59e0b">guard</tspan>
    </text>
    <text y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="22" fill="#cbd5e1">
      Detect file coupling risk in PRs from git co-change history.
    </text>
    <text y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="16" fill="#94a3b8">
      Free · Zero-config · 5 lines of YAML · GitHub + GitLab
    </text>

    <!-- Risk legend -->
    <g transform="translate(0 120)" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14">
      <g><circle cx="8" cy="-4" r="7" fill="#22c55e"/><text x="22" y="0" fill="#cbd5e1">low &lt; 0.3</text></g>
      <g transform="translate(120 0)"><circle cx="8" cy="-4" r="7" fill="#f59e0b"/><text x="22" y="0" fill="#cbd5e1">medium &lt; 0.7</text></g>
      <g transform="translate(280 0)"><circle cx="8" cy="-4" r="7" fill="#ef4444"/><text x="22" y="0" fill="#cbd5e1">high ≥ 0.7</text></g>
    </g>
  </g>
</svg>
